name: Release

# Cut a GitHub Release when a vX.Y.Z tag is pushed, using the matching CHANGELOG section
# as the notes (single source of truth — see RELEASING.md).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract CHANGELOG section
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '
            $0 ~ "^## \\["v"\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then echo "No CHANGELOG section for $ver" >&2; exit 1; fi
          cat notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md
